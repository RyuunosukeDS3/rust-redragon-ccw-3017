name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: redragon-lcd-linux-amd64
            use-cross: false
          - target: x86_64-pc-windows-gnu
            artifact: redragon-lcd-windows-amd64.exe
            use-cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.use-cross && matrix.target || '' }}

      - name: Install Linux dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Windows dependencies
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 pkg-config

      - name: Install cross (Windows only)
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build Linux (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release

      - name: Build Windows (cross)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Copy binary (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cp target/release/redragon-lcd ${{ matrix.artifact }}

      - name: Copy binary (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: cp target/${{ matrix.target }}/release/redragon-lcd.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f | xargs -I{} cp {} dist/

      - name: Install semantic-release and plugins
        run: |
          npm init -y
          npm install --no-save semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github \
            @semantic-release/git \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          npx semantic-release